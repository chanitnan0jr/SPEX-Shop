name: Deploy SpecBot Backend to Azure

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/backend-deploy.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitHub Action
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build project
        run: |
          cd backend
          npm install
          npm run build

      - name: Prepare deployment package
        run: |
          mkdir -p backend/deploy
          cp -r backend/dist backend/deploy/
          cp backend/package.json backend/deploy/
          cp backend/package-lock.json backend/deploy/
          cd backend/deploy
          # Install production dependencies only to keep the zip size manageable
          npm install --omit=dev

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v2
        with:
          app-name: Specbot-backend
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: backend/deploy
